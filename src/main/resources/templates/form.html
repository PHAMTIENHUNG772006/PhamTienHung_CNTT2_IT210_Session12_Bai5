<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Form bác sĩ</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container">
    <h2 th:text="${doctor.id == null} ? 'Thêm bác sĩ' : 'Cập nhật bác sĩ'"></h2>

    <form th:action="@{/doctors/save}" th:object="${doctor}" method="post" class="form-horizontal">

        <div class="form-group">
            <label class="col-sm-2 control-label">Mã bác sĩ</label>
            <div class="col-sm-6">
                <input type="text" class="form-control" th:field="*{id}">
            </div>
        </div>

        <div class="form-group">
            <label class="col-sm-2 control-label">Tên</label>
            <div class="col-sm-6">
                <input type="text" class="form-control" th:field="*{name}">
            </div>
        </div>

        <div class="form-group">
            <label class="col-sm-2 control-label">Chuyên khoa</label>
            <div class="col-sm-6">
                <input type="text" class="form-control" th:field="*{specialization}">
            </div>
        </div>

        <div class="form-group">
            <label class="col-sm-2 control-label">Kinh nghiệm</label>
            <div class="col-sm-6">
                <input type="number" class="form-control" th:field="*{experience}">
            </div>
        </div>

        <div class="form-group">
            <label class="col-sm-2 control-label">SĐT</label>
            <div class="col-sm-6">
                <input type="text" class="form-control" th:field="*{phone}">
            </div>
        </div>

        <div class="form-group">
            <label class="col-sm-2 control-label">Địa chỉ</label>
            <div class="col-sm-6">
                <input type="text" class="form-control" th:field="*{address}">
            </div>
        </div>

        <div class="form-group">
            <label class="col-sm-2 control-label">Ngày vào làm</label>
            <div class="col-sm-6">
                <input type="date" class="form-control" th:field="*{startDate}">
            </div>
        </div>

        <div class="form-group">
            <label class="col-sm-2 control-label">Avatar</label>
            <div class="col-sm-6">
                <input type="text" class="form-control" th:field="*{avatar}" placeholder="vd: doctor1.jpg">
            </div>
        </div>

        <div class="form-group">
            <div class="col-sm-offset-2 col-sm-6">
                <button type="submit" class="btn btn-primary">Lưu</button>
                <a th:href="@{/doctors}" class="btn btn-default">Quay lại</a>
            </div>
        </div>

    </form>
</div>
</body>
</html>
